<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unblockable Proxy V4</title>

    <script src="https://cdn.jsdelivr.net/npm/libcurl.js@latest/libcurl_full.js"></script>
    <style>
        :root { 
            --red: #ff0000; 
            --dark-bg: #0a0a0a; 
            --panel: #1a1a1a; 
            --tab-inactive: #222; 
            --text: #ffffff;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--dark-bg); color: var(--text); overflow: hidden; }
        
        #tab-bar { display: flex; align-items: flex-end; padding: 10px 10px 0 10px; gap: 5px; background: #000; border-bottom: 2px solid var(--red); user-select: none; }
        
        .tab { 
            background: var(--tab-inactive); 
            color: #aaa;
            padding: 10px 20px; 
            border-radius: 8px 8px 0 0; 
            min-width: 140px; 
            font-size: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #333;
            border-bottom: none;
            transition: 0.2s;
        }
        .tab.active { background: var(--red); color: white; font-weight: bold; border-color: var(--red); }
        .tab:hover:not(.active) { background: #2a2a2a; }

        #toolbar { background: var(--panel); padding: 12px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; }
        
        input { 
            padding: 10px; 
            border: 1px solid #444; 
            border-radius: 6px; 
            outline: none; 
            background: #252525; 
            color: white; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--red); box-shadow: 0 0 8px rgba(255, 0, 0, 0.3); }
        
        #url-input { flex-grow: 1; }
        
        button.action-btn { 
            background: var(--red); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }
        button.action-btn:hover { filter: brightness(1.2); }

        #viewport-container { flex-grow: 1; background: white; position: relative; }
        .viewport { width: 100%; height: 100%; border: none; display: none; }
        .viewport.active { display: block; }

        .close-btn { margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="tab-bar">
    <button onclick="addTab()" style="background:#333; color:white; border:none; padding:5px 12px; margin-bottom:5px; border-radius:4px; cursor:pointer; font-weight:bold;">+</button>
</div>

<div id="toolbar">
    <input type="text" id="wisp-server" placeholder="Wisp Server" value="wss://wisp.mercurywork.shop/" style="width:220px;">
    <input type="text" id="url-input" placeholder="Enter URL" onkeypress="if(event.key==='Enter') navigate()">
    <button class="action-btn" onclick="navigate()">Go</button>
</div>

<div id="viewport-container"></div>

<script>
    let tabs = [];
    let activeTabId = null;
    let currentWisp = null;

    async function navigate() {
        const urlInput = document.getElementById('url-input');
        const wispInput = document.getElementById('wisp-input');
        
        let url = urlInput.value.trim();
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;

        try {
            let wispUrl = wispInput.value.trim();
            if (!wispUrl.endsWith('/')) wispUrl += '/';
            
            // Optimization: Only re-initialize if the Wisp server changed
            if (currentWisp !== wispUrl) {
                await libcurl.set_websocket(wispUrl);
                currentWisp = wispUrl;
            }

            // CACHE CHECK
            const cached = localStorage.getItem(`cache_${url}`);
            if (cached) {
                const iframe = document.getElementById(`iframe-${tab.id}`);
                iframe.srcdoc = cached;
                tab.url = url;
                updateTabUI();
                return;
            }

            const response = await libcurl.fetch(url, { redirect: 'follow' });

            // Handle redirects
            if (response.url && response.url !== url) {
                url = response.url;
                urlInput.value = url;
            }

            const html = await response.text();
            const iframe = document.getElementById(`iframe-${tab.id}`);
            
            tab.url = url;
            updateTabUI();

            const fullContent = `<base href="${url}">` + html;
            
            // SAVE TO LOCAL STORAGE
            try { localStorage.setItem(`cache_${url}`, fullContent); } catch(e) {}
            
            iframe.srcdoc = fullContent;
            
        } catch (e) {
            console.error(e);
        }
    }

    function addTab() {
        const id = Date.now();
        tabs.push({ id, url: 'about:blank' });
        
        const iframe = document.createElement('iframe');
        iframe.id = `iframe-${id}`;
        iframe.className = 'viewport';
        iframe.sandbox = "allow-scripts allow-forms allow-same-origin";
        document.getElementById('viewport-container').appendChild(iframe);
        
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.viewport').forEach(f => f.classList.remove('active'));
        document.getElementById(`iframe-${id}`).classList.add('active');
        
        const tab = tabs.find(t => t.id === id);
        document.getElementById('url-input').value = tab.url === 'about:blank' ? '' : tab.url;
        updateTabUI();
    }

    function closeTab(id, event) {
        event.stopPropagation();
        if (tabs.length === 1) return;
        const index = tabs.findIndex(t => t.id === id);
        tabs.splice(index, 1);
        document.getElementById(`iframe-${id}`).remove();
        if (activeTabId === id) switchTab(tabs[tabs.length - 1].id);
        else updateTabUI();
    }

    function updateTabUI() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.querySelectorAll('.tab').forEach(t => t.remove());
        
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            let display = "New Tab";
            try { if(tab.url !== 'about:blank') display = new URL(tab.url).hostname; } catch(e){}
            btn.innerHTML = `<span>${display}</span><span class="close-btn" onclick="closeTab(${tab.id}, event)">×</span>`;
            btn.onclick = () => switchTab(tab.id);
            tabBar.insertBefore(btn, tabBar.lastElementChild);
        });
    }

    window.onload = addTab;
</script>
</body>
</html>
